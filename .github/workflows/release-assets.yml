name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish assets for (for example, v1.0.0)
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_VERSION: 8.0.x
  PROJECT_PATH: src/Ars.Cli/Ars.Cli.csproj

concurrency:
  group: release-assets-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            asset_name: ars-win-x64
            archive_name: ars-${{ github.event.release.tag_name || inputs.tag }}-win-x64.zip
            archive_format: zip
          - os: ubuntu-latest
            rid: linux-x64
            asset_name: ars-linux-x64
            archive_name: ars-${{ github.event.release.tag_name || inputs.tag }}-linux-x64.tar.gz
            archive_format: tar.gz
          - os: macos-latest
            rid: osx-arm64
            asset_name: ars-osx-arm64
            archive_name: ars-${{ github.event.release.tag_name || inputs.tag }}-osx-arm64.tar.gz
            archive_format: tar.gz

    steps:
      - name: Resolve tag
        id: vars
        shell: pwsh
        run: |
          $tag = '${{ github.event.release.tag_name || inputs.tag }}'

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "A release tag is required."
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Tag '$tag' does not match the expected release pattern."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.vars.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish executable
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'publish'

          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime '${{ matrix.rid }}' `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o $publishDir

      - name: Package Windows asset
        if: matrix.archive_format == 'zip'
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'publish'
          $archivePath = Join-Path $env:RUNNER_TEMP '${{ matrix.archive_name }}'

          if (Test-Path $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $archivePath

      - name: Package Unix asset
        if: matrix.archive_format == 'tar.gz'
        shell: bash
        run: |
          publish_dir="$RUNNER_TEMP/publish"
          archive_path="$RUNNER_TEMP/${{ matrix.archive_name }}"
          tar -czf "$archive_path" -C "$publish_dir" .

      - name: Generate checksum
        shell: pwsh
        run: |
          $archivePath = Join-Path $env:RUNNER_TEMP '${{ matrix.archive_name }}'
          $checksumPath = "$archivePath.sha256"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive_name }}" | Set-Content -LiteralPath $checksumPath -NoNewline

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ runner.temp }}/${{ matrix.archive_name }}
            ${{ runner.temp }}/${{ matrix.archive_name }}.sha256
          if-no-files-found: error

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Resolve tag
        id: vars
        shell: pwsh
        run: |
          $tag = '${{ github.event.release.tag_name || inputs.tag }}'

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "A release tag is required."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.vars.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --verify-tag --generate-notes
          fi

      - name: Build combined checksums file
        shell: bash
        run: |
          assets_dir="${RUNNER_TEMP}/release-assets"
          cat "$assets_dir"/*.sha256 | sort > "$assets_dir/SHA256SUMS.txt"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.vars.outputs.tag }}"
          assets_dir="${RUNNER_TEMP}/release-assets"

          gh release upload "$tag" \
            "$assets_dir"/*.zip \
            "$assets_dir"/*.tar.gz \
            "$assets_dir"/SHA256SUMS.txt \
            --clobber
