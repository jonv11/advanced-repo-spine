name: Bug Report
description: Report a bug or incorrect behavior in ARS
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact steps to reproduce the behavior.
      placeholder: |
        1. Create a model file with ...
        2. Run `ars compare --model ars.json`
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include the full command output if possible.
    validations:
      required: true

  - type: input
    id: ars-version
    attributes:
      label: ARS version
      description: Output of `ars --version` or the version you are using.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      description: Output of `dotnet --version`.
      placeholder: "8.0.x"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: textarea
    id: model-file
    attributes:
      label: Model file (if relevant)
      description: Paste your `ars.json` or a minimal version that reproduces the issue.
      render: json

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might help (directory structure, screenshots, logs).
